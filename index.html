<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
<div id="flipbook">
    <div class="hard"> စာမျက်နှာ ၁ (အဖုံး) </div>
    <div class="hard"> စာမျက်နှာ ၂ </div>
    <div> စာမျက်နှာ ၃ </div>
    <div> စာမျက်နှာ ၄ </div>
    <div class="hard"> စာမျက်နှာ ၅ (နောက်ဖုံး) </div>
</div>
<style>
    #flipbook { width: 600px; height: 400px; margin: auto; }
    #flipbook .page { background: white; border: 1px solid #ccc; padding: 20px; }
</style>

<script>
    $(document).ready(function() {
        $("#flipbook").turn({
            width: 600,
            height: 400,
            autoCenter: true
        });
    });
</script>
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Birthday Wish</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #fce4ec; font-family: sans-serif; margin: 0; }
        .card { width: 300px; height: 400px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .card:hover .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .front { background-color: #ff80ab; color: white; }
        .back { background-color: #ffffff; color: #333; transform: rotateY(180deg); padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <h1>Happy Birthday!</h1>
                <p>Card လေးကို နှိပ်ကြည့်လိုက်ပါ</p>
            </div>
            <div class="back">
                <h2>ပျော်ရွှင်စရာ မွေးနေ့လေး ဖြစ်ပါစေ</h2>
                <p>ဒီနေ့မှာ အရာအားလုံး အဆင်ပြေပြီး ပျော်ရွှင်နိုင်ပါစေလို့ ဆုတောင်းပေးလိုက်ပါတယ် ကိုကို့ချစ်လေးရေ</p>
            </div>
        </div>
    </div>
</body>
</html>
